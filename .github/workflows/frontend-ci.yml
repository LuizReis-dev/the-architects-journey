name: frontend-ci
run-name: Frontend CI - ${{ github.event.pull_request.user.login || github.actor }} - ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp || github.event.repository.pushed_at }}

on:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 24.x
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Linting
        run: npm run lint

      - name: Build
        run: npm run build
